name: DSP CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  dsp-validation:
    name: Ruff and DSP math tests
    runs-on: ubuntu-latest

    env:
      DSP_CI_HEADLESS: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install DSP CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Confirm UI packages are absent
        run: |
          python - <<'PY'
          import importlib.util

          forbidden = ("PySide6", "matplotlib", "pyqtgraph")
          found = [name for name in forbidden if importlib.util.find_spec(name) is not None]
          if found:
              raise SystemExit(f"Forbidden UI packages installed in DSP CI: {found}")
          PY

      - name: Lint DSP and tests with ruff
        run: python -m ruff check src/core/dsp_live.py src/core/dsp_review.py src/core/fatigue_analysis.py tests

      - name: Run headless DSP validation tests
        run: python -m pytest
